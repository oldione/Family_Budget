<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#111d3c"/>
  <!-- Donut: r=10, circumference=62.8. Blue 68%=42.7, Orange 32%=20.1 -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#2d63f5" stroke-width="6"
    stroke-dasharray="42.7 20.1" transform="rotate(-90 16 16)"/>
  <circle cx="16" cy="16" r="10" fill="none" stroke="#e06fa8" stroke-width="6"
    stroke-dasharray="10 52.7" stroke-dashoffset="-42.7" transform="rotate(-90 16 16)"/>
  <circle cx="16" cy="16" r="10" fill="none" stroke="#4caf7d" stroke-width="6"
    stroke-dasharray="10.1 52.7" stroke-dashoffset="-52.7" transform="rotate(-90 16 16)"/>
  <circle cx="16" cy="16" r="6" fill="#111d3c"/>
</svg>
